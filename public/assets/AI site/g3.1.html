<script>
(function(){
  function initScatter(listId, canvasId, lineColor, isLight) {
    const list = document.getElementById(listId);
    const canvas = document.getElementById(canvasId);
    if (!list || !canvas) return;

    const points = Array.from(list.querySelectorAll('.scatter-point'));
    const ctx = canvas.getContext('2d');
    let progress = 0; 
    let raf;

    function resize() {
      const rect = list.getBoundingClientRect();
      canvas.width = list.offsetWidth;
      canvas.height = list.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function getAnchor(pt) {
      const num = pt.querySelector('.si-num');
      const listRect = list.getBoundingClientRect();
      const numRect = num.getBoundingClientRect();
      return {
        x: numRect.left - listRect.left + numRect.width * 0.5,
        y: numRect.top - listRect.top + numRect.height * 0.55
      };
    }

    function drawLine(fromPt, toPt, t) {
      const a = getAnchor(fromPt);
      const b = getAnchor(toPt);

      const mx = (a.x + b.x) / 2 + (b.y - a.y) * 0.3;
      const my = (a.y + b.y) / 2 + (a.x - b.x) * 0.15;

      ctx.save();
      // Glowing neon style
      ctx.shadowColor = lineColor;
      ctx.shadowBlur = 12;
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';

      ctx.beginPath();
      const steps = 60;
      let drawing = false;
      for (let i = 0; i <= steps * t; i++) {
        const tt = i / steps;
        const x = (1-tt)*(1-tt)*a.x + 2*(1-tt)*tt*mx + tt*tt*b.x;
        const y = (1-tt)*(1-tt)*a.y + 2*(1-tt)*tt*my + tt*tt*b.y;
        if (!drawing) { ctx.moveTo(x, y); drawing = true; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function render() {
      resize();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < Math.floor(progress) && i < points.length - 1; i++) {
        drawLine(points, points, 1);
      }

      const cur = Math.floor(progress);
      if (cur < points.length - 1) {
        drawLine(points, points, progress - cur);
      }

      points.forEach((pt, i) => {
        if (i <= Math.floor(progress) + 0.3) {
          pt.classList.add('is-active');
        } else {
          pt.classList.remove('is-active');
        }
      });

      raf = requestAnimationFrame(render);
    }

    function onScroll() {
      const listRect = list.getBoundingClientRect();
      const vh = window.innerHeight;
      const start = listRect.top - vh * 0.85;
      const end = listRect.top + listRect.height * 0.096;
      const raw = -start / (end - start);
      progress = Math.max(0, Math.min(points.length - 1, raw * (points.length - 1)));
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    render();
  }

  initScatter('whyList', 'whyCanvas', '#4ade80', false);
  initScatter('howList', 'howCanvas', '#4B8EFF', true);

})();
</script>

<script>
// ── Cursor glow ──
const glow = document.getElementById('cursorGlow');
let mx=window.innerWidth/2, my=window.innerHeight/2, gx=mx, gy=my;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function animG(){ gx+=(mx-gx)*.08; gy+=(my-gy)*.08; glow.style.left=gx+'px'; glow.style.top=gy+'px'; requestAnimationFrame(animG); })();

// ── Nav scroll ──
window.addEventListener('scroll', ()=>{
  document.getElementById('mainNav').classList.toggle('scrolled', scrollY>10);
}, {passive:true});

// ── Canvas background particles (UPDATED WITH COLORS & GLOW) ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles=[], scrollY_val=0;

const colors =;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('scroll', ()=>{ scrollY_val=window.scrollY; }, {passive:true});

class Particle {
  constructor(){
    this.reset(true);
  }
  reset(init){
    this.x = Math.random()*W;
    this.y = init ? Math.random()*H*4 : Math.random()*H*4;
    this.baseY = this.y;
    this.size = Math.random()*3+1;
    this.opacity = Math.random()*0.15+0.05;
    this.speed = Math.random()*0.3+0.05;
    this.type = Math.floor(Math.random()*3); 
    this.parallaxFactor = Math.random()*0.18+0.04;
    this.drift = (Math.random()-0.5)*0.2;
    this.phase = Math.random()*Math.PI*2;
    this.color = colors;
  }
  draw(t){
    const floatY = Math.sin(t*0.0005+this.phase)*6;
    const py = this.baseY - scrollY_val*this.parallaxFactor + floatY;
    if(py<-20 || py>H+20) return;
    const px = this.x + Math.sin(t*0.0003+this.phase)*4;

    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.strokeStyle = this.color;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.lineWidth = 1;

    if(this.type===0){
      ctx.beginPath();
      ctx.arc(px, py, this.size, 0, Math.PI*2);
      ctx.fill();
    } else if(this.type===1){
      const s=this.size*1.5;
      ctx.beginPath();
      ctx.moveTo(px-s,py); ctx.lineTo(px+s,py);
      ctx.moveTo(px,py-s); ctx.lineTo(px,py+s);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(px, py, this.size*1.2, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

for(let i=0;i<100;i++) particles.push(new Particle());

function animCanvas(t){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>p.draw(t));
  requestAnimationFrame(animCanvas);
}
requestAnimationFrame(animCanvas);

// ── Before/After slider ──
const baC=document.getElementById('baC');
const baAfter=document.getElementById('baAfter');
const baLine=document.getElementById('baLine');
let dragging=false, pct=50;

function slide(x){
  const r=baC.getBoundingClientRect();
  pct=Math.max(4,Math.min(96,(x-r.left)/r.width*100));
  baAfter.style.clipPath=`inset(0 ${100-pct}% 0 0)`;
  baLine.style.left=pct+'%';
}

baC.addEventListener('mousedown',e=>{dragging=true;slide(e.clientX);clearAuto();});
document.addEventListener('mouseup',()=>dragging=false);
document.addEventListener('mousemove',e=>dragging&&slide(e.clientX));
baC.addEventListener('touchstart',e=>{dragging=true;slide(e.touches.clientX);clearAuto();},{passive:true});
document.addEventListener('touchend',()=>dragging=false);
document.addEventListener('touchmove',e=>dragging&&slide(e.touches.clientX),{passive:true});

let sweepDone=false, sweepDir=1, sweepPct=50, sweepId;
function sweepAnim(){
  sweepPct += sweepDir * 0.6;
  if(sweepDir===1 && sweepPct>=75){ sweepDir=-1; }
  else if(sweepDir===-1 && sweepPct<=25){ sweepDir=0; }
  else if(sweepDir===0){ sweepPct += (50-sweepPct)*0.08; if(Math.abs(sweepPct-50)<0.3){ sweepPct=50; sweepDone=true; } }
  baAfter.style.clipPath=`inset(0 ${100-sweepPct}% 0 0)`;
  baLine.style.left=sweepPct+'%';
  if(!sweepDone) sweepId=requestAnimationFrame(sweepAnim);
}
sweepId=requestAnimationFrame(sweepAnim);

baC.addEventListener('mousemove', e => {
  if(!dragging){ const r=baC.getBoundingClientRect(); slide(e.clientX); }
});
baC.addEventListener('mouseleave', () => {
  if(!dragging){ baAfter.style.clipPath='inset(0 50% 0 0)'; baLine.style.left='50%'; }
});
function clearAuto(){ cancelAnimationFrame(sweepId); sweepDone=true; }

// ── Style chips ──
function setStyle(el){
  document.querySelectorAll('.spill').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(el.dataset.grad) baAfter.style.background=el.dataset.grad;
}

// ── Drag-scroll style track ──
const track=document.getElementById('stylesTrack');
let isDown=false,startX,scrollL;
track.addEventListener('mousedown',e=>{isDown=true;startX=e.pageX-track.offsetLeft;scrollL=track.scrollLeft;});
track.addEventListener('mouseleave',()=>isDown=false);
track.addEventListener('mouseup',()=>isDown=false);
track.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();track.scrollLeft=scrollL-(e.pageX-track.offsetLeft-startX)*1.2;});

// ── Scroll reveal ──
const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');}),{threshold:.1});
document.querySelectorAll('.reveal,.reveal-stagger').forEach(el=>obs.observe(el));

// ── Magnetic / 3D micro-interaction ──
document.querySelectorAll('.ctag,.spill,.brief-row').forEach(el=>{
  el.addEventListener('mousemove',e=>{
    const r=el.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*8;
    const y=((e.clientY-r.top)/r.height-.5)*8;
    el.style.transform=`translate(${x}px,${y}px)`;
  });
  el.addEventListener('mouseleave',()=>{ el.style.transform=''; });
});

// ── 3D TILT EFFECT FOR STYLE CARDS ──
document.querySelectorAll('.scard').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const rotateX = ((y / rect.height) - 0.5) * -20; // Max tilt 20deg
    const rotateY = ((x / rect.width) - 0.5) * 20;
    
    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.08, 1.08, 1.08)`;
    card.style.zIndex = "10";
    
    // Add glass reflection glare
    let glare = card.querySelector('.glare');
    if(!glare) {
        glare = document.createElement('div');
        glare.className = 'glare';
        glare.style.position = 'absolute';
        glare.style.top = '0';
        glare.style.left = '0';
        glare.style.width = '100%';
        glare.style.height = '100%';
        glare.style.background = 'radial-gradient(circle at center, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%)';
        glare.style.pointerEvents = 'none';
        glare.style.opacity = '0';
        glare.style.transition = 'opacity 0.3s';
        card.appendChild(glare);
    }
    
    const glareX = (x / rect.width) * 100;
    const glareY = (y / rect.height) * 100;
    glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 60%)`;
    glare.style.opacity = '1';
  });
  
  card.addEventListener('mouseleave', () => {
    // Rely on CSS transition for smooth return
    card.style.transform = ''; 
    card.style.zIndex = "1";
    const glare = card.querySelector('.glare');
    if(glare) glare.style.opacity = '0';
  });
});
</script>
</body>
</html>
